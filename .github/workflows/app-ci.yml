name: app-ci

# Builds and tests the Phase 0 console scaffold (issue #5) and the append-only
# event log (issue #6): single-writer guard, clean+idempotent migrations, the
# event-log tests (append, triggers, tamper detection), and a live chain verify.
# Separate from spec-consistency.yml (which stays standard-library-Python only).

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          # Throwaway CI-only credentials; never used in any deployed environment.
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: evolveos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d evolveos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/evolveos

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate types from JSON Schemas
        run: pnpm typegen

      - name: Build
        run: pnpm build

      - name: Every event write goes through the eventlog module
        run: pnpm check:eventlog

      - name: Migrations apply to a clean DB
        run: pnpm migrate

      - name: Migrations are idempotent (no-op on second run)
        run: pnpm migrate

      - name: Typecheck + tests (generated type, event log, append-only triggers)
        run: pnpm test

      - name: Verify the event-log hash chain
        run: pnpm verify:events
